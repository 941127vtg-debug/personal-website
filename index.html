            <br />
            現就學於臺北
          </p>
          

          <p>
            董書劭2005年出生於南投，現就讀國立臺北藝術大學新媒體藝術學系。專注於新媒體藝術研究及創作，長期關注社會制度、觀看關係、技術系統與身體經驗之間的轉換。
          </p>
          

          <p>
            作品常從日常經驗出發，嘗試回應當代生活中經驗、身體與媒介的狀態。曾獲IPA國際攝影獎榮譽獎（2024）；全國學生攝影比賽高中組金獎（2023）。
            
          </p>
          

          <p>
            目前創作包括《學而不思則罔，思而不學則殆》、《窺視》等，作品涉及攝影、裝置、錄像藝術。
          </p>
